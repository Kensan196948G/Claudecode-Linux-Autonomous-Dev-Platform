[tool.pytest.ini_options]
testpaths = ["claudecode-devos/tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-v --tb=short"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "B"]
ignore = [
    "E501",   # line too long (handled by formatter)
    # Note: subprocess rules are suppressed via bandit skips (B603/B607 are bandit IDs, not ruff)
]

[tool.bandit]
exclude_dirs = [
    "claudecode-devos/runtime",
    "claudecode-devos/templates",
    "claudecode-devos/tests",
]
skips = ["B603", "B607"]   # subprocess patterns are intentional; documented in security_policy.md
